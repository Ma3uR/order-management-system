services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --requirepass testpassword123
    environment:
      - REDIS_PASSWORD=testpassword123
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "testpassword123", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  redis_data:
